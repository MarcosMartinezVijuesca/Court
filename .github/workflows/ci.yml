# ── CI: se ejecuta en cada Pull Request a develop o main ─────
name: CI — Build y Tests

on:
  pull_request:
    branches: [ develop, main ]
  push:
    branches: [ develop ]

jobs:
  build-and-test:
    name: Compilar y pasar tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache de Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Permisos Gradle wrapper
        run: chmod +x ./gradlew

      - name: Compilar APK debug
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Ejecutar tests unitarios
        run: ./gradlew test --no-daemon

      - name: Publicar resultados de tests
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Resultados JUnit
          path: app/build/test-results/**/*.xml
          reporter: java-junit
